server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Vue Router history 친駕連넣
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 쓰檄栗都뻠닸
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
