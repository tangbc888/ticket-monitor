version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data      # łÖľĂ»ŻĘýľÝżâ
    environment:
      - DATABASE_URL=sqlite:///./data/ticket_monitor.db
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - FCM_CREDENTIALS_PATH=${FCM_CREDENTIALS_PATH:-}
    restart: unless-stopped
    networks:
      - ticket-network

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - ticket-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - ticket-network

networks:
  ticket-network:
    driver: bridge
